<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuMail - Inbox</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .email-card {
            margin-bottom: 20px;
        }
        .email-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .attachment-link {
            display: block;
            margin-top: 5px;
        }
        .refresh-btn {
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h1 class="text-center mb-4">Inbox</h1>
        <button onclick="location.reload();" class="btn btn-secondary refresh-btn">Refresh Inbox</button>
        {% for email in emails %}
        <div class="card email-card">
            <div class="card-header email-header">
                <h5 class="mb-0">{{ email.subject }}</h5>
                <small class="text-muted">From: {{ email.from }} | Date: {{ email.date }}</small>
            </div>
            <div class="card-body">
                <p>{{ email.body | safe }}</p> <!-- Use | safe if body might contain HTML, else remove -->
                {% if email.attachments %}
                <h6>Attachments:</h6>
                <ul class="list-group">
                    {% for attach in email.attachments %}
                    <li class="list-group-item">
                        <a href="{{ attach.url }}" download="{{ attach.filename }}" class="attachment-link">{{ attach.filename }}</a>
                    </li>
                    {% endfor %}
                </ul>
                {% endif %}
            </div>
        </div>
        {% endfor %}
        <a href="/compose" class="btn btn-primary">Compose New Email</a>
    </div>
    <script src="/static/js/script.js"></script>
</body>
</html>
